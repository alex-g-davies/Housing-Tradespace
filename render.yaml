# Render blueprint (spec 006 R4): one Docker web service, single origin.
# MAPBOX_TOKEN is set in the Render dashboard (sync: false) — never here.
# NOTE: the live service was renamed tradespace -> livenear in the dashboard
# (018); its onrender.com subdomain keeps the original tradespace-x5xj slug —
# Render never changes a subdomain after creation.
services:
  - type: web
    name: livenear
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: MAPBOX_TOKEN
        sync: false
      - key: MAPBOX_DAILY_CALL_BUDGET
        value: "2000"
      # Dual-workplace mode (016 R7) can burst ~6 requests per interaction.
      - key: RATE_LIMIT_UPSTREAM
        value: 20/minute
      - key: LOG_FORMAT
        value: json
