# CI gate (spec 006 R5): lint + test both halves, then smoke the Docker image
# in fixture mode (no secrets needed). Render autodeploys main, so protect the
# main branch to ensure only CI-green commits land there.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -f backend/Dockerfile -t tradespace:ci .
      - name: Smoke test (fixture mode, no token)
        run: |
          docker run -d --rm --name tradespace -p 8000:8000 tradespace:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health > /dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://localhost:8000/api/health
          curl -fsS http://localhost:8000/api/zips.geojson?state=WA -o /dev/null
          curl -fsS http://localhost:8000/api/isochrone?minutes=30 -o /dev/null
          curl -fsS http://localhost:8000/ | grep -qi "<!doctype html"
          docker stop tradespace
